name: Detect infrastructure drift
on:
  schedule:
    # Run once an hour.
    # GitHub throttles scheduled jobs if too many are queued at once,
    # so they recommend scheduling them at a random minute instead of
    # minute 0. https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
    - cron: '16 * * * *'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  detect-drift:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/production
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.2.0
        with:
          role-to-assume: arn:aws:iam::588562868276:role/GitHubActionsReadonlyRole
          aws-region: us-east-1

      - name: Get Terraform Version
        id: tf_version
        run: echo "value=$(cat .terraform-version)" >> $GITHUB_OUTPUT

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ steps.tf_version.outputs.value }}
          terraform_wrapper: false

      - name: Initialize Terraform
        uses: nick-invision/retry@7152eba30c6575329ac0576536151aca5a72780e  # v3.0.0
        with:
          command: cd terraform/production && terraform init
          max_attempts: 5
          timeout_minutes: 5

      - name: Run Terraform Plan
        run: terraform plan -lock=false -detailed-exitcode -no-color -input=false -out=tfplan > tfplan_output.txt 2>&1
        env:
          TF_VAR_eks_cluster_role: "arn:aws:iam::588562868276:role/GitHubActionsReadonlyRole"
          TF_VAR_gitlab_token: ${{ secrets.GITLAB_ACCESS_TOKEN }}

      - name: Send Slack alert on drift
        if: failure()
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: spack-alerts
          SLACK_CHANNEL_ID: C06NHUC54NB
        run: |
          upload_file() {
            local filepath="$1"
            local title="$2"
            local filename
            filename=$(basename "$filepath")
            local filesize
            filesize=$(wc -c < "$filepath")

            # Step 1: Get upload URL
            local response
            response=$(curl -s -X POST \
              -H "Authorization: Bearer $SLACK_TOKEN" \
              -F "filename=$filename" \
              -F "length=$filesize" \
              https://slack.com/api/files.getUploadURLExternal)

            local upload_url file_id
            upload_url=$(echo "$response" | jq -r '.upload_url')
            file_id=$(echo "$response" | jq -r '.file_id')

            if [ "$upload_url" = "null" ] || [ -z "$upload_url" ]; then
              echo "Error getting upload URL for $filename: $response"
              return 1
            fi

            # Step 2: Upload file content to the presigned URL
            curl -s -X POST \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@$filepath" \
              "$upload_url"

            # Step 3: Complete the upload and share to channel
            curl -s -X POST \
              -H "Authorization: Bearer $SLACK_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"files\": [{\"id\": \"$file_id\", \"title\": \"$title\"}], \"channel_id\": \"$SLACK_CHANNEL_ID\"}" \
              https://slack.com/api/files.completeUploadExternal
          }

          # Post message
          curl -s -X POST \
            -H "Content-type: application/json" \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -d "{\"channel\": \"$SLACK_CHANNEL\", \"text\": \":rotating_light: :rotating_light: :rotating_light: Infrastructure drift detected! :rotating_light: :rotating_light: :rotating_light:\"}" \
            https://slack.com/api/chat.postMessage

          # Upload TF plan stdout
          upload_file tfplan_output.txt "tfplan_output.txt"

          # Upload TF plan binary file
          upload_file tfplan "tfplan"
