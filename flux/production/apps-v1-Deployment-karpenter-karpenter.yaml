---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: karpenter
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: karpenter
    app.kubernetes.io/version: 0.17.0
    helm.sh/chart: karpenter-v0.17.0
  name: karpenter
  namespace: karpenter
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/instance: karpenter
      app.kubernetes.io/name: karpenter
  strategy:
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: karpenter
        app.kubernetes.io/name: karpenter
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: karpenter.sh/provisioner-name
                operator: DoesNotExist
      containers:
      - env:
        - name: CLUSTER_NAME
          value: spack
        - name: CLUSTER_ENDPOINT
          value: https://4EE4596A78ADAE99BAE77B27930BDC27.gr7.us-east-1.eks.amazonaws.com
        - name: KARPENTER_SERVICE
          value: karpenter
        - name: SYSTEM_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: AWS_DEFAULT_INSTANCE_PROFILE
          value: KarpenterInstanceProfile
        - name: MEMORY_LIMIT
          valueFrom:
            resourceFieldRef:
              containerName: controller
              divisor: '0'
              resource: limits.memory
        image: public.ecr.aws/karpenter/controller:v0.17.0@sha256:fdcc960e49135974f3aa3a3d3f658c38c1ef7ff3e393809241c39f23ff856268
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 30
          timeoutSeconds: 30
        name: controller
        ports:
        - containerPort: 8080
          name: http-metrics
          protocol: TCP
        - containerPort: 8081
          name: http
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          timeoutSeconds: 30
        resources:
          limits:
            cpu: 1
            memory: 1Gi
          requests:
            cpu: 1
            memory: 1Gi
      - args:
        - -port=8443
        env:
        - name: CLUSTER_NAME
          value: spack
        - name: KUBERNETES_MIN_VERSION
          value: 1.19.0-0
        - name: CLUSTER_ENDPOINT
          value: https://4EE4596A78ADAE99BAE77B27930BDC27.gr7.us-east-1.eks.amazonaws.com
        - name: KARPENTER_SERVICE
          value: karpenter
        - name: SYSTEM_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: MEMORY_LIMIT
          valueFrom:
            resourceFieldRef:
              containerName: webhook
              divisor: '0'
              resource: limits.memory
        - name: AWS_DEFAULT_INSTANCE_PROFILE
          value: KarpenterInstanceProfile
        image: public.ecr.aws/karpenter/webhook:v0.17.0@sha256:e55a1cf485b0c942afac711dab800275fad9ac3a318f3531a2cefba19ef32b24
        imagePullPolicy: IfNotPresent
        livenessProbe:
          httpGet:
            port: https-webhook
            scheme: HTTPS
          initialDelaySeconds: 30
        name: webhook
        ports:
        - containerPort: 8443
          name: https-webhook
          protocol: TCP
        readinessProbe:
          httpGet:
            port: https-webhook
            scheme: HTTPS
        resources:
          limits:
            cpu: 200m
            memory: 100Mi
          requests:
            cpu: 200m
            memory: 100Mi
      dnsPolicy: Default
      nodeSelector:
        kubernetes.io/os: linux
      priorityClassName: system-cluster-critical
      securityContext:
        fsGroup: 1000
      serviceAccountName: karpenter
      tolerations:
      - key: CriticalAddonsOnly
        operator: Exists
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app.kubernetes.io/instance: karpenter
            app.kubernetes.io/name: karpenter
        maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
