---
taxonomy:
  version: "0.0.0-dev"
  # Ordered from highest to lowest priority; first match wins during deconfliction.
  # See upload_gitlab_failure_logs.py for stuck_or_timeout_failure and scheduler_failure,
  # which are assigned via build_failure_reason rather than log pattern matching.
  error_classes:
    # Network errors
    - name: oidc_certificate_expired
      grep_for:
        - "OpenIDConnect provider's HTTPS certificate doesn't match configured thumbprint"

    - name: dns_error
      grep_for:
        - 'could not resolve host'

    - name: network_timeout
      grep_for:
        - "socket.timeout"
        - 'curl: \(28\)'
        - "The read operation timed out"

    - name: network_error
      grep_for:
        - 'curl: \(22\)'
        - "HTTP Error 404"
        - 'curl: \(60\)'
        - "ConnectionResetError:"
        - "curl.+SSL_ERROR_SYSCALL"
        - 'Job failed \(system failure\):.+TLS handshake timeout'
        - 'curl: \(6\) Could not resolve host'

    # API scrape errors
    - name: job_log_missing
      grep_for:
        - "ERROR: Got [0-9][0-9][0-9] for"
        - "ERROR: Log File Empty"

    # System errors that would otherwise get categorized as Spack errors
    - name: no_space
      grep_for:
        - "No space left on device"

    # Spack errors
    - name: invalid_pipeline_yaml
      grep_for:
        - 'Error:.+ is not valid under any of the given schemas'

    - name: checksum_mismatch
      grep_for:
        - 'Error: sha256 checksum failed for .+'

    - name: concretization_error
      grep_for:
        - "does not satisfy"
        - "Error: errors occurred during concretization"
        - "Error: concretization failed for the following reasons"
        - "Spack concretizer internal error."
        - "failed to concretize .+ for the following reasons"
        - "variant .+ not found in package"
        - "trying to set variant .+ in package .+, but the package has no such variant"
        - "No such variant .+ for spec"
        - "UnknownVariantError"
        - "Spec version is not concrete"
        - "UnsatisfiableSpecError"
        - "cannot have a dependency on"

    - name: no_binary_for_spec
      grep_for:
        - 'Error: No binary found when cache-only was specified'
        - 'no binary available'

    - name: db_match
      grep_for:
        - 'Error: Expected database version'
        - 'spack.store.MatchError:'

    - name: db_hash
      grep_for:
        - 'Error: Expected database index keyed by'

    - name: no_spec
      grep_for:
        - 'SpackError: No installed spec matches the hash'

    - name: failed_to_get_specs
      grep_for:
        - 'Error: Unable to generate package index: Failed to get list of entries from'

    - name: ref_not_found
      grep_for:
        - 'fatal: Remote branch'
        - 'fatal: couldn.t find remote ref'

    - name: cmd_not_found
      grep_for:
        - 'Command exited with status 127'

    - name: module_not_found
      grep_for:
        - 'ModuleNotFoundError: No module named'

    - name: setup_env
      grep_for:
        - 'setup-env.sh: No such file or directory'

    - name: spack_root
      grep_for:
        - 'Error: SPACK_ROOT'

    - name: write_lock_timeout
      grep_for:
        - 'Timed out waiting for a write lock'

    - name: reloc_path_too_long
      grep_for:
        - 'Error: Failed to install.+due to CannotGrowString: Cannot replace.+To fix this, compile with more padding'

    - name: build_error
      grep_for:
        - 'error found in build log:'
        - 'errors found in build log:'

    - name: spack_error
      grep_for:
        - 'To reproduce this build locally, run:'
        - 'Error: No version for .+ satisfies'
        - 'Error: errors occurred during concretization of the environment'
        - 'cannot load package .+ from the .builtin. repository'
        - 'must have a default provider in /builds/spack/spack/etc/spack/defaults/packages.yaml'
        - 'Error: .+ object has no attribute'
        - 'Error: module .+ has no attribute'
        - 'spack.error.InstallError'
        - 'Traceback \(most recent call last\):[\S\n\t\v ]+AssertionError'
        - 'ConfigFormatError'
        - 'KeyError: VersionBase'

    - name: pipeline_generation
      grep_for:
        - 'Error: Pipeline generation failed'
        - 'RuntimeError: cannot emit requirements for the solver:'
        - 'SpackEnvironmentConfigError: Invalid environment configuration'

    - name: killed
      grep_for:
        - 'Killed'

    - name: deprecated_stack_bug
      grep_for:
        - 'Error: Mirror with name mirror_override already exists.'

    - name: aborted_terminated
      grep_for:
        - 'ERROR: Job failed \(system failure\): aborted: terminated'

    - name: bootstrap_patchelf_failure
      grep_for:
        - 'Error: cannot bootstrap any of the patchelf executables'

    # System errors
    - name: oom
      grep_for:
        - 'command terminated with exit code 137'
        - 'ERROR: Job failed: exit code 137'

    - name: gitlab_down
      grep_for:
        - "fatal: unable to access 'https://gitlab.spack.io"

    - name: github_down
      grep_for:
        - "fatal: unable to access 'https://github.com"

    - name: artifacts
      grep_for:
        - 'ERROR: Uploading artifacts'
        - 'ERROR: Downloading artifacts'

    - name: fatal
      grep_for:
        - 'FATAL: invalid argument'

    - name: pod_exec
      grep_for:
        - 'Error response from daemon: No such exec instance'

    - name: pod_timeout
      grep_for:
        - 'timed out waiting for pod to start'
        - 'ERROR: Job failed (system failure): prepare environment: Timeout occurred.'

    - name: spot_reclamation
      grep_for:
        - 'node no longer exists'
        - 'Pod was terminated in response to imminent node shutdown'

    - name: pod_cleanup
      grep_for:
        - 'Error cleaning up pod'

    - name: pod_not_found
      grep_for:
        - 'ERROR: Job failed \(system failure\):.+pods .+ not found'

    - name: pod_failed
      grep_for:
        - 'ERROR: Job failed.*:.*pod.+status is ("Failed"|failed)'

    - name: pod_invalid
      grep_for:
        - 'Pod.+is invalid'

    - name: helper_container_not_found
      grep_for:
        - 'ERROR: Job failed.+:.+container helper not found in pod'
        - 'container not found \("helper"\)'

    - name: image_pull
      grep_for:
        - 'ERROR: Job failed: failed to pull image'
        - 'ERROR: Job failed.+image pull failed'
        - 'ERROR: Job failed \(system failure\): failed to pull image'
        - 'image pull failed: Back-off pulling image'

    - name: docker_daemon
      grep_for:
        - 'Cannot connect to the Docker daemon'

    - name: docker_format
      grep_for:
        - 'exec /usr/bin/sh: exec format error'

    - name: rpc_failure
      grep_for:
        - 'error: RPC failed'

    - name: dial_backend
      grep_for:
        - 'error dialing backend'

    - name: remote_disconnect
      grep_for:
        - 'http.client.RemoteDisconnected'

    - name: aws_access_denied
      grep_for:
        - 'The AWS Access Key Id you provided does not exist in our records'
        - 'An error occurred (AccessDenied)'

    - name: nvidia_detection_error
      grep_for:
        - 'nvidia-container-cli: detection error: nvml error'

    - name: execution_timeout
      grep_for:
        - "ERROR: Job failed: execution took longer than"

    - name: 5XX
      grep_for:
        - 'HTTP Error 5[00|02|03]'

    # Other errors
    - name: gpg_fail_open_files
      grep_for:
        - "gpg: can't open '/tmp/*'"

    - name: gpg_no_valid_ids
      grep_for:
        - 'gpg: key.+: no valid user IDs'

    - name: unallowed_image
      grep_for:
        - 'The.+image is not present on list of allowed images'

    - name: limit_exceeded
      grep_for:
        - "Job's log exceeded limit of"

    - name: sha256sum_not_found
      grep_for:
        - 'sha256sum: command not found'

    - name: file_not_found
      grep_for:
        - "No such file or directory"
