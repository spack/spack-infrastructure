concurrent = 4
check_interval = 10
shutdown_timeout = 0

[session_server]
  session_timeout = 1800

[[runners]]
  name = "uo-gilgamesh-cpu-small-medium-1"
  limit = 4
  url = "https://gitlab.spack.io"
  id = 187684
  token = "%%GITLAB_TOKEN%%"
  token_obtained_at = 2026-07-24T16:54:45Z
  token_expires_at = 0001-01-01T00:00:00Z
  executor = "docker"
  pre_build_script = "  echo 'Executing Spack pre-build setup script'\n  for cmd in \"${PY3:-}\" python3 python; do\n    if command -v > /dev/null \"$cmd\"; then\n      export PY3=\"$(command -v \"$cmd\")\"\n      break\n    fi\n  done\n  if [ -z \"${PY3:-}\" ]; then\n    echo \"Unable to find python3 executable\"\n    exit 1\n  fi\n  $PY3 -c \"import urllib.request;urllib.request.urlretrieve('https://raw.githubusercontent.com/spack/spack-infrastructure/main/scripts/gitlab_runner_pre_build/pre_build.py', 'pre_build.py')\"\n  $PY3 pre_build.py > envvars\n  . ./envvars\n  rm -f envvars\n  unset GITLAB_OIDC_TOKEN\n  "
  [runners.cache]
    MaxUploadedArchiveSize = 0
    [runners.cache.s3]
      AssumeRoleMaxConcurrency = 0
    [runners.cache.gcs]
    [runners.cache.azure]
  [runners.docker]
    tls_verify = false
    image = "ubuntu:26.04"
    privileged = false
    disable_entrypoint_overwrite = false
    oom_kill_disable = false
    disable_cache = false
    volumes = ["/cache"]
    volume_keep = false
    shm_size = 0
    network_mtu = 0
    allowed_pull_policies = ["always", "if-not-present"]
    pull_policy = ["if-not-present"]
