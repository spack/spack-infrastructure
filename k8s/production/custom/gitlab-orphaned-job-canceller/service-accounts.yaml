---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitlab-orphaned-job-canceller
  namespace: custom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gitlab-orphaned-job-canceller
  namespace: pipeline
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gitlab-orphaned-job-canceller
  namespace: pipeline
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gitlab-orphaned-job-canceller
subjects:
- kind: ServiceAccount
  name: gitlab-orphaned-job-canceller
  namespace: custom
